<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="SSR">
  <defs>
    <radialGradient id="gold-face" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#F5E6B8" />
      <stop offset="45%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#8B6914" />
    </radialGradient>
    <linearGradient id="gold-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D78C" />
      <stop offset="50%" stop-color="#C9A227" />
      <stop offset="100%" stop-color="#7A5E12" />
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#soft-glow)">
    <g fill="#FFFFFF" opacity="0.95">
      <ellipse cx="60" cy="14" rx="5" ry="9" />
      <ellipse cx="60" cy="106" rx="5" ry="9" />
      <ellipse cx="14" cy="60" rx="9" ry="5" />
      <ellipse cx="106" cy="60" rx="9" ry="5" />
      <ellipse cx="27" cy="27" rx="4.5" ry="8" transform="rotate(-45 27 27)" />
      <ellipse cx="93" cy="27" rx="4.5" ry="8" transform="rotate(45 93 27)" />
      <ellipse cx="27" cy="93" rx="4.5" ry="8" transform="rotate(45 27 93)" />
      <ellipse cx="93" cy="93" rx="4.5" ry="8" transform="rotate(-45 93 93)" />
    </g>
    <circle cx="60" cy="60" r="34" fill="url(#gold-face)" stroke="url(#gold-ring)" stroke-width="2.5" />
    <circle cx="60" cy="60" r="28" fill="none" stroke="#FFF8E7" stroke-width="0.8" opacity="0.55" />
    <text
      x="60"
      y="68"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="22"
      font-weight="700"
      letter-spacing="-0.5"
      fill="#5C3D0A"
    >
      SSR
    </text>
  </g>
</svg>
